<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let dados = [8, 15, 3, 27, 12];
        let maior = dados[0];

        for (let i = 1; i < dados.length; i++) {
            if (dados[i] > maior) {
                maior = dados[i];
            }
        }
        
        console.log("Maior valor = ", maior);
    </script>
</body>
</html>
