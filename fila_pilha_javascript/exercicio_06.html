<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let dados = [2, 5, 2, 7, 2, 9];
        let alvo = 2;
        let contador = 0;

        for (let i = 0; i < dados.length; i++) {
            if (dados[i] === alvo) {
                contador++;
            }
        }

        if (contador == 0)
            console.log('Valor alvo não encontrado no vetor');
        else
            console.log('Encontrado ', contador, ' vezes');
    </script>
</body>
</html>
