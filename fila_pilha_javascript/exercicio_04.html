<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let dados = [10, 20, 30, 40, 50];
        let procurado = 30;
        let posicao = -1;

        for (let i = 0; i < dados.length; i++) {
            if (dados[i] === procurado) {
                posicao = i;
                break;
            }
        }
        
        console.log("Posição =", posicao);
    </script>
</body>
</html>
